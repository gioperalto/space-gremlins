name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            space-gremlins/server/package-lock.json
            space-gremlins/client/package-lock.json

      - name: Install client dependencies
        working-directory: space-gremlins/client
        run: npm ci

      - name: Build client
        working-directory: space-gremlins/client
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: space-gremlins
        run: railway up --service space-gremlins
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
