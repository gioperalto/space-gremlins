<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Space Gremlins</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    canvas {
      display: block;
      image-rendering: auto;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      color: #00e5ff;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-weight: 700;
      font-size: 24px;
      z-index: 999;
    }
    #loading .dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div>SPACE GREMLINS</div>
    <div style="font-size:14px;margin-top:12px;color:#888;">Loading<span class="dots"></span></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
